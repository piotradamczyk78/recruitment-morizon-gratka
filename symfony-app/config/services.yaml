parameters:
    phoenix_api_url: '%env(PHOENIX_BASE_URL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Likes\LikeRepositoryInterface:
        alias: App\Likes\LikeRepository

    App\Service\PhoenixApiClient:
        arguments:
            $phoenixApiUrl: '%phoenix_api_url%'
